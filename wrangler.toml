# ═══════════════════════════════════════════════════════════════
#  WRANGLER.TOML – Configuration Cloudflare Worker
#  Projet : Lacheheb Portfolio API
# ═══════════════════════════════════════════════════════════════

name = "lacheheb-api"
main = "worker.js"
compatibility_date = "2024-01-01"

# ── VARIABLES D'ENVIRONNEMENT ──────────────────────────────────
[vars]
ADMIN_CODE = "301263"

# !! GROQ_API_KEY ne doit PAS être ici en clair !!
# Exécutez cette commande une seule fois :
#   wrangler secret put GROQ_API_KEY
# Puis entrez votre clé gsk_... (gratuite sur https://console.groq.com)

# ── KV NAMESPACE ──────────────────────────────────────────────
# Créez le KV avec : wrangler kv:namespace create LACHEHEB_KV
# Puis collez l'id retourné ci-dessous

[[kv_namespaces]]
binding = "LACHEHEB_KV"
id = "REMPLACEZ_PAR_VOTRE_KV_ID"

# ── COMMANDES DE DÉPLOIEMENT ───────────────────────────────────
# npm install -g wrangler
# wrangler login
# wrangler kv:namespace create LACHEHEB_KV     → copier l'id ici
# wrangler secret put GROQ_API_KEY             → coller la clé gsk_...
# wrangler deploy                              → déployer !
# wrangler tail                                → logs en temps réel
