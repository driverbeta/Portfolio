# ═══════════════════════════════════════════════════════════════
#  WRANGLER.TOML – Cloudflare Worker — Lacheheb Portfolio
#  AUCUNE CLÉ API EXTERNE REQUISE
# ═══════════════════════════════════════════════════════════════

name = "lacheheb-api"
main = "worker.js"
compatibility_date = "2024-01-01"

[vars]
ADMIN_CODE = "301263"

# ── KV Namespace (base de données) ────────────────────────────
# Créez-le avec : wrangler kv:namespace create LACHEHEB_KV
# Puis collez l'id retourné ici :
[[kv_namespaces]]
binding = "LACHEHEB_KV"
id = "REMPLACEZ_PAR_VOTRE_KV_ID"

# ── Déploiement en 3 commandes ─────────────────────────────────
# npm install -g wrangler
# wrangler login
# wrangler kv:namespace create LACHEHEB_KV   → copier l'id ci-dessus
# wrangler deploy                             → TERMINÉ !
