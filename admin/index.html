<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · A. Lacheheb</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0a1628; --blue:#1a4a8a; --blue-mid:#2563b0;
  --gold:#c9a84c; --white:#fff; --off:#f7f8fc;
  --text:#0d1b2e; --muted:#6b7c96; --border:#dde4ef;
  --green:#22c55e; --red:#ef4444; --amber:#f59e0b;
  --shadow:0 4px 24px rgba(10,22,40,0.1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--off);font-family:'Outfit',sans-serif;color:var(--text);min-height:100vh;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);}
.login-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:48px 40px;width:100%;max-width:380px;position:relative;}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:12px 12px 0 0;}
.login-logo{width:56px;height:56px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:var(--navy);margin:0 auto 24px;font-family:'Space Mono',monospace;}
.login-title{text-align:center;font-size:1.3rem;font-weight:600;color:var(--white);margin-bottom:6px;}
.login-sub{text-align:center;font-size:0.72rem;color:rgba(255,255,255,0.4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:36px;}
.login-box input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:14px 16px;font-family:'Space Mono',monospace;font-size:1.5rem;color:var(--white);text-align:center;letter-spacing:8px;outline:none;transition:border-color 0.2s;margin-bottom:16px;}
.login-box input:focus{border-color:var(--gold);}
.login-btn{width:100%;background:var(--gold);color:var(--navy);border:none;border-radius:8px;padding:14px;font-size:0.78rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
.login-btn:hover{background:#f0d080;}
.login-error{color:var(--red);font-size:0.78rem;text-align:center;margin-top:12px;display:none;}

/* NAV */
#admin-panel{display:none;}
.admin-nav{background:var(--navy);border-bottom:1px solid rgba(201,168,76,0.2);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;position:sticky;top:0;z-index:100;}
.admin-brand{display:flex;align-items:center;gap:10px;font-weight:600;color:var(--white);font-size:0.88rem;}
.admin-brand .dot{width:8px;height:8px;background:var(--gold);border-radius:50%;}
.nav-btns{display:flex;gap:8px;}
.btn-sm{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:6px 12px;font-size:0.7rem;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.7);cursor:pointer;transition:all 0.2s;text-decoration:none;}
.btn-sm:hover{background:rgba(255,255,255,0.15);color:var(--white);}
.btn-danger{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.3);color:#fca5a5;}

/* LAYOUT */
.admin-layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 60px);}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--white);}
.sidebar-head{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sidebar-head h3{font-size:0.82rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.conv-list{flex:1;overflow-y:auto;}
.conv-item{padding:14px 16px;border-bottom:1px solid var(--border-soft,#edf1f8);cursor:pointer;transition:background 0.2s;display:flex;flex-direction:column;gap:4px;position:relative;}
.conv-item:hover{background:var(--off);}
.conv-item.active{background:#eff6ff;border-left:3px solid var(--blue-mid);}
.conv-item.unread .conv-name::after{content:'●';color:var(--blue-mid);font-size:0.5rem;vertical-align:middle;margin-left:6px;}
.conv-name{font-size:0.88rem;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px;}
.conv-preview{font-size:0.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px;}
.conv-meta{display:flex;align-items:center;gap:8px;}
.conv-time{font-size:0.65rem;color:var(--muted);font-family:'Space Mono',monospace;}
.badge{font-size:0.58rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:3px;}
.badge.open{background:rgba(37,99,176,0.1);color:var(--blue-mid);}
.badge.closed{background:rgba(107,114,128,0.1);color:var(--muted);}
.badge.blocked{background:rgba(239,68,68,0.1);color:var(--red);}
.unread-dot{width:8px;height:8px;background:var(--blue-mid);border-radius:50%;position:absolute;top:14px;right:14px;flex-shrink:0;}

/* MAIN */
.conv-main{display:flex;flex-direction:column;overflow:hidden;}
.conv-main-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--white);}
.conv-main-head h2{font-size:1rem;font-weight:600;color:var(--text);}
.conv-main-head p{font-size:0.72rem;color:var(--muted);}
.conv-actions{display:flex;gap:8px;}
.btn-close-conv{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:6px;padding:6px 12px;font-size:0.7rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--amber);cursor:pointer;transition:all 0.2s;}
.btn-close-conv:hover{background:rgba(245,158,11,0.2);}
.btn-block-conv{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:6px;padding:6px 12px;font-size:0.7rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--red);cursor:pointer;transition:all 0.2s;}
.btn-block-conv:hover{background:rgba(239,68,68,0.2);}
.btn-reopen-conv{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:6px;padding:6px 12px;font-size:0.7rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#16a34a;cursor:pointer;transition:all 0.2s;}

/* MESSAGES */
.conv-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:#f9fafc;}
.msg-bubble{max-width:80%;border-radius:10px;padding:10px 14px;font-size:0.85rem;line-height:1.5;}
.msg-bubble.visitor{background:var(--navy);color:var(--white);border-bottom-right-radius:4px;align-self:flex-end;}
.msg-bubble.admin{background:var(--white);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;align-self:flex-start;}
.msg-bubble.system{background:transparent;border:none;color:var(--muted);font-size:0.72rem;font-style:italic;text-align:center;align-self:center;padding:4px;}
.msg-time{font-size:0.6rem;opacity:0.5;margin-top:3px;}
.msg-time.right{text-align:right;}

/* REPLY */
.conv-reply{padding:12px 16px;border-top:1px solid var(--border);background:var(--white);display:flex;gap:8px;}
.conv-reply textarea{flex:1;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'Outfit',sans-serif;font-size:0.84rem;resize:none;height:72px;outline:none;transition:border-color 0.2s;}
.conv-reply textarea:focus{border-color:var(--blue-mid);}
.reply-send{background:var(--navy);color:var(--white);border:none;border-radius:8px;padding:10px 16px;font-size:0.8rem;font-weight:600;cursor:pointer;transition:background 0.2s;align-self:flex-end;}
.reply-send:hover{background:var(--blue-mid);}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px;background:var(--white);border-bottom:1px solid var(--border);}
.stat-mini{background:var(--off);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:center;}
.stat-mini-num{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;color:var(--navy);}
.stat-mini-lbl{font-size:0.6rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}

/* EMPTY */
.empty-conv{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--muted);font-size:0.9rem;gap:12px;}
.empty-conv span{font-size:3rem;}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:var(--white);padding:12px 20px;border-radius:8px;font-size:0.82rem;display:none;border-left:3px solid var(--gold);z-index:9999;box-shadow:0 8px 32px rgba(10,22,40,0.3);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">AL</div>
    <div class="login-title">Espace Administration</div>
    <div class="login-sub">Abderrahmane Lacheheb · Privé</div>
    <input type="password" id="code-input" placeholder="Code" maxlength="6" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">🔐 Accéder</button>
    <div class="login-error" id="login-error">Code incorrect.</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-panel">
  <nav class="admin-nav">
    <div class="admin-brand"><div class="dot"></div>Admin · A. Lacheheb</div>
    <div class="nav-btns">
      <a href="/" class="btn-sm">← Site</a>
      <button class="btn-sm" onclick="loadAll()">🔄 Actualiser</button>
      <button class="btn-sm btn-danger" onclick="logout()">Déconnexion</button>
    </div>
  </nav>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-mini"><div class="stat-mini-num" id="s-unique">—</div><div class="stat-mini-lbl">Visiteurs uniques</div></div>
    <div class="stat-mini"><div class="stat-mini-num" id="s-today">—</div><div class="stat-mini-lbl">Aujourd'hui</div></div>
    <div class="stat-mini"><div class="stat-mini-num" id="s-convs">—</div><div class="stat-mini-lbl">Conversations</div></div>
    <div class="stat-mini"><div class="stat-mini-num" id="s-unread">—</div><div class="stat-mini-lbl">Non lus</div></div>
  </div>

  <div class="admin-layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-head">
        <h3>Conversations</h3>
        <span id="conv-count" style="font-size:0.72rem;color:var(--muted);"></span>
      </div>
      <div class="conv-list" id="conv-list">
        <div style="padding:20px;text-align:center;color:var(--muted);font-size:0.82rem;">Chargement...</div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="conv-main" id="conv-main">
      <div class="empty-conv">
        <span>💬</span>
        <p>Sélectionnez une conversation</p>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API_BASE = 'https://api.abderrahmane-lacheheb.fr';
let adminToken   = sessionStorage.getItem('admin_token');
let activeConvId = null;
let autoRefresh  = null;

if (adminToken) showPanel();

// ── AUTH ──────────────────────────────────────────────────────
async function doLogin() {
  const code = document.getElementById('code-input').value.trim();
  try {
    const res  = await fetch(`${API_BASE}/admin/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ code }) });
    const data = await res.json();
    if (data.ok) {
      adminToken = data.token;
      sessionStorage.setItem('admin_token', adminToken);
      showPanel();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  } catch {
    document.getElementById('login-error').textContent = 'Erreur réseau.';
    document.getElementById('login-error').style.display = 'block';
  }
}

function showPanel() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-panel').style.display  = 'block';
  loadAll();
  autoRefresh = setInterval(loadAll, 15000);
}

function logout() {
  sessionStorage.removeItem('admin_token');
  clearInterval(autoRefresh);
  location.reload();
}

// ── DATA ──────────────────────────────────────────────────────
async function loadAll() {
  await loadStats();
  await loadConversations();
  if (activeConvId) await openConversation(activeConvId, false);
}

async function loadStats() {
  try {
    const res  = await fetch(`${API_BASE}/stats`);
    const data = await res.json();
    document.getElementById('s-unique').textContent = data.unique_visitors ?? '—';
    document.getElementById('s-today').textContent  = data.today_visits    ?? '—';
  } catch {}
}

async function loadConversations() {
  try {
    const res  = await fetch(`${API_BASE}/admin/conversations`, { headers:{ 'Authorization': 'Bearer ' + adminToken } });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    const convs = data.conversations || [];

    document.getElementById('s-convs').textContent  = convs.length;
    document.getElementById('s-unread').textContent = convs.filter(c => c.unread_admin > 0).length;
    document.getElementById('conv-count').textContent = convs.length + ' conversation(s)';

    const list = document.getElementById('conv-list');
    if (convs.length === 0) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:0.82rem;">Aucune conversation pour l\'instant.</div>';
      return;
    }

    list.innerHTML = convs.map(c => `
      <div class="conv-item ${activeConvId === c.visitor_id ? 'active' : ''} ${c.unread_admin > 0 ? 'unread' : ''}"
           onclick="openConversation('${c.visitor_id}')">
        ${c.unread_admin > 0 ? '<div class="unread-dot"></div>' : ''}
        <div class="conv-name">
          👤 ${esc(c.name)}
          <span class="badge ${c.status}">${c.status === 'open' ? 'Ouvert' : c.status === 'closed' ? 'Clôturé' : 'Bloqué'}</span>
        </div>
        <div class="conv-preview">${esc(c.last_msg || 'Aucun message')}</div>
        <div class="conv-meta">
          <span class="conv-time">${formatDate(c.last_activity)}</span>
          <span style="font-size:0.65rem;color:var(--muted);">🌍 ${c.ip}</span>
          ${c.unread_admin > 0 ? `<span style="font-size:0.65rem;background:var(--blue-mid);color:white;border-radius:10px;padding:1px 7px;">${c.unread_admin} non lu</span>` : ''}
        </div>
      </div>
    `).join('');
  } catch(e) { console.error(e); }
}

async function openConversation(visitor_id, scroll = true) {
  activeConvId = visitor_id;

  // Highlight dans la liste
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.conv-item').forEach(el => {
    if (el.onclick?.toString().includes(visitor_id)) el.classList.add('active');
  });

  try {
    const res  = await fetch(`${API_BASE}/admin/conversation?visitor_id=${visitor_id}`, { headers:{ 'Authorization': 'Bearer ' + adminToken } });
    const data = await res.json();
    const conv = data.conversation;
    if (!conv) return;

    renderConvMain(conv, scroll);
    // Update unread dans la liste
    loadConversations();
  } catch(e) { console.error(e); }
}

function renderConvMain(conv, scroll = true) {
  const main = document.getElementById('conv-main');
  const isClosed  = conv.status === 'closed';
  const isBlocked = conv.status === 'blocked';
  const isOpen    = conv.status === 'open';

  main.innerHTML = `
    <div class="conv-main-head">
      <div>
        <h2>👤 ${esc(conv.name)} <span style="font-size:0.7rem;color:var(--muted);">· ${conv.ip}</span></h2>
        <p>Débuté le ${formatDate(conv.started)} · ${conv.messages.length} message(s)</p>
      </div>
      <div class="conv-actions">
        ${isOpen ? `
          <button class="btn-close-conv" onclick="closeConv('${conv.visitor_id}')">🔒 Clôturer</button>
          <button class="btn-block-conv" onclick="blockConv('${conv.visitor_id}')">🚫 Bloquer</button>
        ` : `
          <button class="btn-reopen-conv" onclick="reopenConv('${conv.visitor_id}')">🔓 Réouvrir</button>
          ${isBlocked ? `<span style="font-size:0.72rem;color:var(--red);font-weight:600;">BLOQUÉ</span>` : `<span style="font-size:0.72rem;color:var(--muted);font-weight:600;">CLÔTURÉ</span>`}
        `}
      </div>
    </div>

    <div class="conv-messages" id="conv-msgs">
      ${conv.messages.map(msg => `
        <div style="display:flex;flex-direction:column;align-items:${msg.from === 'visitor' ? 'flex-end' : msg.from === 'admin' ? 'flex-start' : 'center'}">
          <div class="msg-bubble ${msg.from}">
            ${msg.from !== 'system' ? `<div style="font-size:0.62rem;opacity:0.6;margin-bottom:3px;">${msg.from === 'visitor' ? '👤 ' + esc(conv.name) : '👨‍🏫 M. Lacheheb'}</div>` : ''}
            ${esc(msg.body)}
            ${msg.from !== 'system' ? `<div class="msg-time ${msg.from === 'visitor' ? 'right' : ''}">${formatDate(msg.ts)}</div>` : ''}
          </div>
        </div>
      `).join('')}
    </div>

    ${isOpen ? `
      <div class="conv-reply">
        <textarea id="reply-input" placeholder="Votre réponse à ${esc(conv.name)}..." onkeydown="if(event.ctrlKey && event.key==='Enter') sendAdminReply('${conv.visitor_id}')"></textarea>
        <button class="reply-send" onclick="sendAdminReply('${conv.visitor_id}')">Envoyer ↵</button>
      </div>
    ` : `
      <div style="padding:12px;text-align:center;font-size:0.78rem;color:var(--muted);border-top:1px solid var(--border);">
        ${isBlocked ? '🚫 Utilisateur bloqué — impossible de répondre' : '🔒 Conversation clôturée'}
      </div>
    `}
  `;

  if (scroll) {
    setTimeout(() => {
      const msgs = document.getElementById('conv-msgs');
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    }, 50);
  }
}

async function sendAdminReply(visitor_id) {
  const input = document.getElementById('reply-input');
  const body  = input?.value?.trim();
  if (!body) return;
  input.value = '';
  try {
    const res  = await fetch(`${API_BASE}/admin/reply`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken },
      body: JSON.stringify({ visitor_id, body }),
    });
    const data = await res.json();
    if (data.ok) {
      showToast('✅ Réponse envoyée !');
      await openConversation(visitor_id);
    }
  } catch { showToast('❌ Erreur réseau.'); }
}

async function closeConv(visitor_id) {
  if (!confirm('Clôturer cette conversation ?')) return;
  await fetch(`${API_BASE}/admin/close`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+adminToken}, body: JSON.stringify({ visitor_id }) });
  showToast('🔒 Conversation clôturée.');
  await loadAll();
}

async function blockConv(visitor_id) {
  if (!confirm('Bloquer cet utilisateur ? Il ne pourra plus envoyer de messages.')) return;
  await fetch(`${API_BASE}/admin/block`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+adminToken}, body: JSON.stringify({ visitor_id }) });
  showToast('🚫 Utilisateur bloqué.');
  await loadAll();
}

async function reopenConv(visitor_id) {
  await fetch(`${API_BASE}/admin/reopen`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+adminToken}, body: JSON.stringify({ visitor_id }) });
  showToast('🔓 Conversation réouverte.');
  await loadAll();
}

function esc(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str || ''));
  return d.innerHTML;
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}
</script>
</body>
</html>
