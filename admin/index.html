<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · A. Lacheheb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1628;
  --navy-mid: #0f2040;
  --blue: #1a4a8a;
  --blue-mid: #2563b0;
  --gold: #c9a84c;
  --white: #ffffff;
  --off: #f7f8fc;
  --text: #0d1b2e;
  --muted: #6b7c96;
  --border: #dde4ef;
  --green: #22c55e;
  --red: #ef4444;
  --shadow: 0 4px 24px rgba(10,22,40,0.1);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--off); font-family: 'Outfit', sans-serif; color: var(--text); min-height: 100vh; }

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--navy);
  position: relative;
  overflow: hidden;
}

#login-screen::before {
  content: '';
  position: absolute;
  top: -200px; right: -200px;
  width: 700px; height: 700px;
  background: radial-gradient(ellipse, rgba(26,74,138,0.3) 0%, transparent 65%);
}

.login-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 48px 40px;
  width: 100%;
  max-width: 380px;
  position: relative;
  z-index: 1;
  backdrop-filter: blur(10px);
}

.login-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  border-radius: 12px 12px 0 0;
}

.login-logo {
  width: 56px; height: 56px;
  background: var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--navy);
  margin: 0 auto 24px;
  font-family: 'Space Mono', monospace;
}

.login-title {
  text-align: center;
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 6px;
}

.login-sub {
  text-align: center;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.4);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 36px;
}

.login-box input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 14px 16px;
  font-family: 'Space Mono', monospace;
  font-size: 1.5rem;
  color: var(--white);
  text-align: center;
  letter-spacing: 8px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 16px;
}

.login-box input:focus { border-color: var(--gold); }
.login-box input::placeholder { letter-spacing: 4px; font-size: 0.85rem; color: rgba(255,255,255,0.25); }

.login-btn {
  width: 100%;
  background: var(--gold);
  color: var(--navy);
  border: none;
  border-radius: 8px;
  padding: 14px;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s;
}

.login-btn:hover { background: #f0d080; transform: translateY(-1px); }

.login-error {
  color: var(--red);
  font-size: 0.78rem;
  text-align: center;
  margin-top: 12px;
  display: none;
}

/* ── ADMIN PANEL ── */
#admin-panel { display: none; }

.admin-nav {
  background: var(--navy);
  border-bottom: 1px solid rgba(201,168,76,0.2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.admin-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  color: var(--white);
  font-size: 0.9rem;
}

.admin-brand .dot {
  width: 8px; height: 8px;
  background: var(--gold);
  border-radius: 50%;
}

.admin-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.btn-sm {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  padding: 7px 14px;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  display: inline-block;
}

.btn-sm:hover { background: rgba(255,255,255,0.15); color: var(--white); }

.btn-logout {
  background: rgba(239,68,68,0.15);
  border-color: rgba(239,68,68,0.3);
  color: #fca5a5;
}

.btn-logout:hover { background: rgba(239,68,68,0.25); }

.admin-main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px;
}

/* ── STAT CARDS ── */
.admin-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}

.astat {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 22px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 14px;
}

.astat-icon {
  width: 42px; height: 42px;
  border-radius: 10px;
  background: var(--navy);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.astat-num {
  font-family: 'Space Mono', monospace;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--navy);
  line-height: 1;
  margin-bottom: 3px;
}

.astat-lbl {
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 500;
}

/* ── MESSAGES ── */
.section-title {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.messages-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.msg-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px;
  box-shadow: var(--shadow);
  transition: border-color 0.2s;
}

.msg-card.unread { border-left: 3px solid var(--blue-mid); }
.msg-card.replied { border-left: 3px solid var(--green); }

.msg-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  gap: 12px;
  flex-wrap: wrap;
}

.msg-sender {
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--text);
}

.msg-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.msg-badge {
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 3px;
}

.msg-badge.new { background: rgba(37,99,176,0.1); color: var(--blue-mid); border: 1px solid rgba(37,99,176,0.2); }
.msg-badge.done { background: rgba(34,197,94,0.1); color: #16a34a; border: 1px solid rgba(34,197,94,0.2); }

.msg-time {
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
}

.msg-ip {
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  background: var(--off);
  padding: 2px 8px;
  border-radius: 3px;
  border: 1px solid var(--border);
}

.msg-body {
  font-size: 0.88rem;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 14px;
  padding: 12px 16px;
  background: var(--off);
  border-radius: 6px;
}

.msg-reply-area {
  display: none;
  flex-direction: column;
  gap: 8px;
}

.msg-reply-area.open { display: flex; }

.msg-reply-area textarea {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.84rem;
  resize: none;
  height: 80px;
  outline: none;
  transition: border-color 0.2s;
}

.msg-reply-area textarea:focus { border-color: var(--blue-mid); }

.msg-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn-reply {
  background: var(--navy);
  color: var(--white);
  border: none;
  border-radius: 6px;
  padding: 8px 16px;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-reply:hover { background: var(--blue-mid); }

.btn-toggle {
  background: var(--off);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 14px;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  color: var(--text);
  transition: all 0.2s;
}

.btn-toggle:hover { background: var(--border); }

.replied-msg {
  background: rgba(34,197,94,0.06);
  border: 1px solid rgba(34,197,94,0.2);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 0.82rem;
  color: #16a34a;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

.empty-state .emoji { font-size: 3rem; margin-bottom: 12px; display: block; }
.empty-state p { font-size: 0.9rem; }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--navy);
  color: var(--white);
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 0.82rem;
  display: none;
  border-left: 3px solid var(--gold);
  z-index: 9999;
  box-shadow: 0 8px 32px rgba(10,22,40,0.3);
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { transform: translateX(20px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* ── WEEK CHART (simple bars) ── */
.week-chart {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px;
  margin-bottom: 32px;
  box-shadow: var(--shadow);
}

.week-chart h3 {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
}

.chart-bars {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  height: 80px;
}

.chart-bar-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  height: 100%;
  justify-content: flex-end;
}

.chart-bar {
  width: 100%;
  background: var(--navy);
  border-radius: 3px 3px 0 0;
  min-height: 4px;
  transition: height 0.6s ease;
}

.chart-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.55rem;
  color: var(--muted);
  text-align: center;
}
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">AL</div>
    <div class="login-title">Espace Administration</div>
    <div class="login-sub">Abderrahmane Lacheheb · Privé</div>
    <input type="password" id="code-input" placeholder="Code d'accès" maxlength="6" onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">🔐 Accéder</button>
    <div class="login-error" id="login-error">Code incorrect. Réessayez.</div>
  </div>
</div>

<!-- ── ADMIN PANEL ── -->
<div id="admin-panel">
  <nav class="admin-nav">
    <div class="admin-brand">
      <div class="dot"></div>
      Administration · A. Lacheheb
    </div>
    <div class="admin-actions">
      <a href="/" class="btn-sm">← Site</a>
      <button class="btn-sm" onclick="loadData()">🔄 Actualiser</button>
      <button class="btn-sm btn-logout" onclick="logout()">Déconnexion</button>
    </div>
  </nav>

  <div class="admin-main">

    <!-- Stats -->
    <div class="admin-stats" id="admin-stats">
      <div class="astat"><div class="astat-icon">👥</div><div><div class="astat-num" id="a-unique">—</div><div class="astat-lbl">Visiteurs uniques</div></div></div>
      <div class="astat"><div class="astat-icon">📅</div><div><div class="astat-num" id="a-today">—</div><div class="astat-lbl">Aujourd'hui</div></div></div>
      <div class="astat"><div class="astat-icon">✉️</div><div><div class="astat-num" id="a-msgs">—</div><div class="astat-lbl">Messages reçus</div></div></div>
      <div class="astat"><div class="astat-icon">✅</div><div><div class="astat-num" id="a-replied">—</div><div class="astat-lbl">Répondus</div></div></div>
    </div>

    <!-- Graphique 7 jours -->
    <div class="week-chart">
      <h3>Visites — 7 derniers jours</h3>
      <div class="chart-bars" id="week-chart-bars">
        <!-- Généré dynamiquement -->
      </div>
    </div>

    <!-- Messages -->
    <div class="section-title">Messages reçus</div>
    <div class="messages-list" id="messages-list">
      <div class="empty-state">
        <span class="emoji">⏳</span>
        <p>Chargement des messages...</p>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const API_BASE = 'http://node.bumpx.fr:4008';

let adminToken = sessionStorage.getItem('admin_token');
if (adminToken) showPanel();

// ── AUTH ──────────────────────────────────────────────────────
async function doLogin() {
  const code = document.getElementById('code-input').value.trim();
  if (!code) return;

  try {
    const res = await fetch(`${API_BASE}/admin/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });
    const data = await res.json();

    if (data.ok && data.token) {
      adminToken = data.token;
      sessionStorage.setItem('admin_token', adminToken);
      showPanel();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('login-error').textContent = 'Erreur réseau. Vérifiez la config API.';
    document.getElementById('login-error').style.display = 'block';
  }
}

function showPanel() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-panel').style.display = 'block';
  loadData();
}

function logout() {
  sessionStorage.removeItem('admin_token');
  adminToken = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('code-input').value = '';
}

// ── LOAD DATA ─────────────────────────────────────────────────
async function loadData() {
  await loadStats();
  await loadMessages();
}

async function loadStats() {
  try {
    const res = await fetch(`${API_BASE}/stats`);
    const data = await res.json();

    document.getElementById('a-unique').textContent = data.unique_visitors ?? '—';
    document.getElementById('a-today').textContent = data.today_visits ?? '—';

    // Graphique
    if (data.week) {
      const maxVal = Math.max(...data.week.map(d => d.visits), 1);
      const barsEl = document.getElementById('week-chart-bars');
      barsEl.innerHTML = data.week.map(d => `
        <div class="chart-bar-wrap">
          <div class="chart-bar" style="height:${Math.max(4, (d.visits / maxVal) * 72)}px"
               title="${d.visits} visite(s)"></div>
          <div class="chart-label">${d.date.slice(5)}</div>
        </div>
      `).join('');
    }
  } catch(e) {
    console.log('Stats error:', e.message);
  }
}

async function loadMessages() {
  try {
    const res = await fetch(`${API_BASE}/admin/messages`, {
      headers: { 'Authorization': 'Bearer ' + adminToken }
    });

    if (res.status === 401) {
      logout();
      return;
    }

    const data = await res.json();
    const msgs = data.messages || [];

    document.getElementById('a-msgs').textContent = msgs.length;
    document.getElementById('a-replied').textContent = msgs.filter(m => m.replied).length;

    const list = document.getElementById('messages-list');

    if (msgs.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <span class="emoji">📭</span>
          <p>Aucun message pour l'instant.<br>Les messages des visiteurs apparaîtront ici.</p>
        </div>`;
      return;
    }

    list.innerHTML = msgs.map(msg => `
      <div class="msg-card ${msg.replied ? 'replied' : 'unread'}" id="card-${msg.id}">
        <div class="msg-card-head">
          <span class="msg-sender">👤 ${escHtml(msg.name)}</span>
          <div class="msg-meta">
            <span class="msg-badge ${msg.replied ? 'done' : 'new'}">${msg.replied ? '✓ Répondu' : '● Nouveau'}</span>
            <span class="msg-time">${formatDate(msg.ts)}</span>
            <span class="msg-ip">🌍 ${msg.country || 'XX'} · ${msg.ip || '—'}</span>
          </div>
        </div>
        <div class="msg-body">${escHtml(msg.body)}</div>

        ${msg.replied ? `
          <div class="replied-msg">
            ✅ <div><strong>Votre réponse :</strong><br>${escHtml(msg.reply)}<br><small style="opacity:0.7">${formatDate(msg.reply_ts)}</small></div>
          </div>
        ` : `
          <div class="msg-actions">
            <button class="btn-toggle" onclick="toggleReply('${msg.id}')">💬 Répondre</button>
          </div>
          <div class="msg-reply-area" id="reply-${msg.id}">
            <textarea id="textarea-${msg.id}" placeholder="Votre réponse à ${escHtml(msg.name)}..."></textarea>
            <div class="msg-actions">
              <button class="btn-reply" onclick="sendReply('${msg.id}')">✈️ Envoyer la réponse</button>
              <button class="btn-toggle" onclick="toggleReply('${msg.id}')">Annuler</button>
            </div>
          </div>
        `}
      </div>
    `).join('');

  } catch(e) {
    console.log('Messages error:', e.message);
    document.getElementById('messages-list').innerHTML = `
      <div class="empty-state">
        <span class="emoji">⚠️</span>
        <p>Erreur de chargement. Vérifiez la config de l'API.</p>
      </div>`;
  }
}

function toggleReply(msgId) {
  const area = document.getElementById('reply-' + msgId);
  area.classList.toggle('open');
  if (area.classList.contains('open')) {
    document.getElementById('textarea-' + msgId).focus();
  }
}

async function sendReply(msgId) {
  const reply = document.getElementById('textarea-' + msgId).value.trim();
  if (!reply) return;

  try {
    const res = await fetch(`${API_BASE}/admin/reply`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + adminToken
      },
      body: JSON.stringify({ msg_id: msgId, reply })
    });
    const data = await res.json();

    if (data.ok) {
      showToast('✅ Réponse envoyée !');
      await loadMessages(); // Rafraîchit la liste
    } else {
      showToast('❌ Erreur : ' + (data.error || 'inconnue'));
    }
  } catch(e) {
    showToast('❌ Erreur réseau.');
  }
}

// ── UTILS ─────────────────────────────────────────────────────
function escHtml(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str || ''));
  return d.innerHTML;
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

// Auto-refresh toutes les 60s
setInterval(() => { if (adminToken) loadMessages(); }, 60000);
</script>
</body>
</html>
